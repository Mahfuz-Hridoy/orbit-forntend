<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — OrbitMind AI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="auth-logo" style="text-decoration:none;"><span>🧠</span> OrbitMind AI</a>
        <h2 style="margin-top: 1rem;">Welcome Back</h2>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem;">Sign in to access your study portal</p>
      </div>

      <div id="error-alert" style="display:none; background-color:rgba(235,87,87,0.1); color:var(--danger); padding:0.75rem; border-radius:8px; border:1px solid var(--danger); font-size:0.85rem; margin-bottom:1.5rem; text-align:center;"></div>

      <form class="auth-form" id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="input-field" placeholder="student@university.edu" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="input-field" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top:1rem;">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
